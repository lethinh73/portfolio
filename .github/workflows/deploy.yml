name: '🚀 Deploy to Server'

on:
  push:
    branches: [ deployment ]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- API (Laravel) ---
      - name: Add .env to api
        env:
          API_ENV: ${{ secrets.API_ENV }}
        working-directory: api
        run: |
          printf "%s\n" "$API_ENV" > .env

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader --no-dev

      - name: Run Laravel migrations
        working-directory: api
        run: php artisan migrate --force --no-interaction

      # --- WEB (Next.js) ---
      - name: Add .env to web
        env:
          WEB_ENV: ${{ secrets.WEB_ENV }}
        working-directory: web
        run: |
          printf "%s\n" "$WEB_ENV" > .env

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build Next.js frontend
        working-directory: web
        run: npm run build

      # --- Deploy ---
      - name: Copy files to server
        run: |
          rsync -av --delete \
            --exclude 'api/storage/' \
            ./ /var/www/portfolio/

      # --- Post-deploy (Laravel optimize) ---
      - name: Optimize Laravel
        run: |
          cd /var/www/portfolio/api
          php artisan optimize:clear
          php artisan optimize

      # --- Post-deploy (Next.js run with PM2) ---
      - name: Serve Next.js frontend with PM2
        run: |
          cd /var/www/portfolio/web
          pm2 delete web || true
          pm2 start npm --name "web" -- run start
