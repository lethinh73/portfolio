name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: thinhsoft-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: |
          npm run build
          if [ -d dist ]; then OUT=dist; elif [ -d build ]; then OUT=build; else echo "No dist/build found"; exit 1; fi
          echo "OUT=$OUT" >> $GITHUB_ENV

      - name: Atomic deploy to /var/www/thinhsoft/current
        run: |
          set -euo pipefail
          APP=/var/www/thinhsoft
          NEW="$APP/current.new"
          rm -rf "$NEW"
          mkdir -p "$NEW"
          rsync -a --delete "${OUT}/" "$NEW/"
          # Gộp file chung nếu có (favicon/robots...):
          [ -d "$APP/shared" ] && rsync -a "$APP/shared/" "$NEW/"
          # Đổi thư mục atomically -> không downtime
          mv -T "$NEW" "$APP/current"

      - name: Quick healthcheck
        run: |
          for i in {1..20}; do
            curl -fsS http://127.0.0.1/ >/dev/null && exit 0 || sleep 1
          done
          echo "Healthcheck failed"; exit 1

      - name: Reload Nginx
        run: sudo systemctl reload nginx || true
