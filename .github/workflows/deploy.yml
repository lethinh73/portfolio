name: '🚀 Deploy to Server'

on:
  push:
    branches: [ deployment ]
  workflow_dispatch: {}

concurrency:
  group: thinhsoft-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: '🛠️ Build and Deploy Locally'
    runs-on: self-hosted

    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@v4

      - name: '📄 Create Production Environment File'
        run: echo "${{ secrets.ENV_FILE }}" > .env
        shell: bash
