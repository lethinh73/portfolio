name: '🚀 Deploy to Server'

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    env:
      API_ENV: ${{ secrets.API_ENV }}
      WEB_ENV: ${{ secrets.WEB_ENV }}
    steps:
      # --- Pull latest code ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Copy files to PROJECT_DIR, ignore storage and cache in the api ---
      - name: Copy files to server directory
        run: |
          rsync -av --delete \
          --exclude 'app/storage/' \
          --exclude 'app/bootstrap/cache/' \
          --exclude 'app/.env' \
          ./ ${{ secrets.PROJECT_DIR }}/

      # --- API (Laravel) ---
      - name: Add .env to application
        working-directory: ${{ secrets.PROJECT_DIR }}/app
        run: printf "%s\n" "$API_ENV" > .env

      - name: Install Composer dependencies
        working-directory: ${{ secrets.PROJECT_DIR }}/app
        run: composer install --no-dev --optimize-autoloader

      - name: Run Laravel migrations
        working-directory: ${{ secrets.PROJECT_DIR }}/app
        run: php artisan migrate --force --no-interaction

      - name: Optimize Laravel
        working-directory: ${{ secrets.PROJECT_DIR }}/app
        run: |
          php artisan optimize:clear
          php artisan optimize

      # --- WEB (React) ---
      - name: Install frontend dependencies
        working-directory: ${{ secrets.PROJECT_DIR }}/app
        run: npm ci

      - name: Build React frontend
        working-directory: ${{ secrets.PROJECT_DIR }}/app
        run: npm run build