name: '🚀 Deploy to Server'

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: thinhsoft-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: '🛠️ Build and Deploy'
    runs-on: [self-hosted, linux]

    env:
      # Paths for both applications
      FRONTEND_APP_PATH: '/var/www/thinhsoft'
      BACKEND_APP_PATH: '/var/www/thinhsoft-backend'

      # Environment versions
      NODE_VERSION: '22.x'
      PHP_VERSION: '8.3'
      
      # Deployment settings
      RELEASES_TO_KEEP: 3

    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@v4

      # =================================================================
      # Frontend Build Steps
      # =================================================================
      - name: '📦 Setup Node.js Environment'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: '⚙️ Install Frontend Dependencies'
        run: npm ci

      - name: '🏗️ Build Frontend Application'
        id: build_step
        run: |
          npm run build
          if [ -d "dist" ]; then
            echo "BUILD_OUTPUT=dist" >> $GITHUB_ENV
          elif [ -d "build" ]; then
            echo "BUILD_OUTPUT=build" >> $GITHUB_ENV
          else
            echo "Error: Could not find 'dist' or 'build' directory." >&2
            exit 1
          fi

      # =================================================================
      # Backend Build Steps
      # =================================================================
      - name: '📦 Setup PHP Environment'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql
          tools: composer

      - name: '⚙️ Install Backend Dependencies'
        run: composer install --no-dev --no-interaction --optimize-autoloader

      # =================================================================
      # Deployment Steps
      # =================================================================
      - name: '🏷️ Set Release Timestamp'
        id: timestamp
        run: echo "RELEASE_TIMESTAMP=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV
      
      - name: '🚀 Atomic Deploy: Frontend'
        run: |
          set -e
          RELEASE_PATH="${{ env.FRONTEND_APP_PATH }}/releases/${{ env.RELEASE_TIMESTAMP }}"
          echo "Creating new frontend release directory: ${RELEASE_PATH}"
          mkdir -p "${RELEASE_PATH}"
          echo "Copying built frontend files..."
          rsync -a --delete "${{ env.BUILD_OUTPUT }}/" "${RELEASE_PATH}/"
          echo "Switching 'current' symlink for frontend..."
          ln -sfn "${RELEASE_PATH}" "${{ env.FRONTEND_APP_PATH }}/current"
          echo "✅ Frontend deployed successfully!"

      - name: '🚀 Atomic Deploy: Backend'
        run: |
          set -e
          RELEASE_PATH="${{ env.BACKEND_APP_PATH }}/releases/${{ env.RELEASE_TIMESTAMP }}"
          echo "Creating new backend release directory: ${RELEASE_PATH}"
          mkdir -p "${RELEASE_PATH}"
          echo "Copying backend files..."
          rsync -a --delete ./backend/ "${RELEASE_PATH}/"
          echo "Switching 'current' symlink for backend..."
          ln -sfn "${RELEASE_PATH}" "${{ env.BACKEND_APP_PATH }}/current"
          echo "✅ Backend deployed successfully!"

      # =================================================================
      # Cleanup Steps
      # =================================================================
      - name: '🧹 Cleanup Old Frontend Releases'
        run: |
          ls -1dt ${{ env.FRONTEND_APP_PATH }}/releases/* | tail -n +$((${{ env.RELEASES_TO_KEEP }} + 1)) | xargs -r rm -rf
          echo "Frontend cleanup complete."

      - name: '🧹 Cleanup Old Backend Releases'
        run: |
          ls -1dt ${{ env.BACKEND_APP_PATH }}/releases/* | tail -n +$((${{ env.RELEASES_TO_KEEP }} + 1)) | xargs -r rm -rf
          echo "Backend cleanup complete."
