name: Deploy to local server

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: thinhsoft-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: |
          npm run build
          if [ -d dist ]; then OUT=dist; else echo "No dist/build found"; exit 1; fi
          echo "OUT=$OUT" >> $GITHUB_ENV

      - name: Atomic deploy to /var/www/thinhsoft/current
        run: |
          set -euo pipefail
          APP=/var/www/thinhsoft
          TS=$(date -u +%Y%m%d%H%M%S)
          REL="$APP/releases/$TS"
          mkdir -p "$REL"
          rsync -a --delete "${OUT}/" "$REL/"
          [ -d "$APP/shared" ] && rsync -a "$APP/shared/" "$REL/"
          ln -sfn "$REL" "$APP/current"

      - name: Cleanup old releases
        run: |
          APP=/var/www/thinhsoft
          ls -1dt $APP/releases/* | tail -n +6 | xargs -r rm -rf


      - name: Quick healthcheck
        run: |
          for i in {1..20}; do
            curl -fsS http://127.0.0.1/ >/dev/null && exit 0 || sleep 1
          done
          echo "Healthcheck failed"; exit 1
