name: '🚀 Deploy to Server'

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: thinhsoft-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: '🛠️ Build and Deploy'
    runs-on: [self-hosted, linux]   # specify linux if appropriate

    env:
      # Paths for both applications
      FRONTEND_APP_PATH: '/var/www/thinhsoft-frontend'
      BACKEND_APP_PATH: '/var/www/thinhsoft-backend'

      # Environment versions
      NODE_VERSION: '22.x'
      PHP_VERSION: '8.4'
      
      # Deployment settings
      RELEASES_TO_KEEP: 3

    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@v4

      # Make npm/node available regardless of the runner's PATH
      - name: '🔧 Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Setup PHP
      - name: '🔧 Setup PHP'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      # =================================================================
      # Frontend Build Steps
      # =================================================================
      - name: '⚙️ Install Frontend Dependencies'
        run: npm ci

      - name: '🏗️ Build Frontend Application'
        id: build_step
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          if [ -d "dist" ]; then
            echo "BUILD_OUTPUT=dist" >> "$GITHUB_ENV"
          elif [ -d "build" ]; then
            echo "BUILD_OUTPUT=build" >> "$GITHUB_ENV"
          else
            echo "Error: Could not find 'dist' or 'build' directory." >&2
            exit 1
          fi

      # =================================================================
      # Backend Build Steps
      # =================================================================
      - name: '⚙️ Install Backend Dependencies'
        working-directory: ./backend
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      # =================================================================
      # Deployment Steps
      # =================================================================
      - name: '🏷️ Set Release Timestamp'
        id: timestamp
        shell: bash
        run: echo "RELEASE_TIMESTAMP=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"
      
      - name: '🚀 Atomic Deploy: Frontend'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_PATH="${FRONTEND_APP_PATH}/releases/${RELEASE_TIMESTAMP}"
          echo "Creating new frontend release directory: ${RELEASE_PATH}"
          mkdir -p "${RELEASE_PATH}"
          echo "Copying built frontend files..."
          # IMPORTANT: use $BUILD_OUTPUT (env var), not ${{ env.BUILD_OUTPUT }}
          rsync -a --delete "${BUILD_OUTPUT}/" "${RELEASE_PATH}/"
          echo "Creating env file..."
          {
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}"
            echo "VITE_NODE_ENV=${{ secrets.VITE_NODE_ENV }}"
          } > "${RELEASE_PATH}/.env"
          echo "Switching 'current' symlink for frontend..."
          ln -sfn "${RELEASE_PATH}" "${FRONTEND_APP_PATH}/current"
          echo "✅ Frontend deployed successfully!"

      - name: '🚀 Atomic Deploy: Backend'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_PATH="${BACKEND_APP_PATH}/releases/${RELEASE_TIMESTAMP}"
          echo "Creating new backend release directory: ${RELEASE_PATH}"
          mkdir -p "${RELEASE_PATH}"
          echo "Copying backend files..."
          rsync -a --delete ./backend/ "${RELEASE_PATH}/"
          echo "Switching 'current' symlink for backend..."
          ln -sfn "${RELEASE_PATH}" "${BACKEND_APP_PATH}/current"
          echo "✅ Backend deployed successfully!"

      # =================================================================
      # Cleanup Steps
      # =================================================================
      - name: '🧹 Cleanup Old Frontend Releases'
        run: |
          ls -1dt ${{ env.FRONTEND_APP_PATH }}/releases/* | tail -n +$((${{ env.RELEASES_TO_KEEP }} + 1)) | xargs -r rm -rf
          echo "Frontend cleanup complete."

      - name: '🧹 Cleanup Old Backend Releases'
        run: |
          ls -1dt ${{ env.BACKEND_APP_PATH }}/releases/* | tail -n +$((${{ env.RELEASES_TO_KEEP }} + 1)) | xargs -r rm -rf
          echo "Backend cleanup complete."
