user  nginx;
worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/xml application/json application/javascript
    application/xml application/xml+rss application/octet-stream image/svg+xml;

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  upstream frontend_upstream { server frontend:3000; keepalive 32; }
  upstream backend_upstream  { server backend:8000;  keepalive 32; }

  include /etc/nginx/conf.d/*.conf;
}
